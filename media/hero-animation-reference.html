<!-- neon-data-core.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Neon Data Core</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap');

    :root{
      --bg0:#000508;
      --bg1:#001133;
      --bg2:#000814;
      --p:#00ffff;     /* primary glow */
      --a:#88ffff;     /* accent */
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;width:100%;}
    body{
      overflow:hidden;
      background:#000;
      font-family:Orbitron,system-ui,Segoe UI,Roboto,Arial;
      color:var(--p);
    }

    /* --- Background wrapper --- */
    #stage{
      position:fixed;
      inset:0;
      background:linear-gradient(135deg,
        var(--bg0) 0%,
        var(--bg1) 25%,
        var(--bg2) 60%,
        #001a0a 100%
      );
    }

    /* --- Overlays --- */
    .grid-overlay{
      position:fixed; inset:0;
      pointer-events:none;
      opacity:.06;
      background-image:
        linear-gradient(rgba(0,255,255,.12) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,255,.12) 1px, transparent 1px);
      background-size:64px 64px;
      animation:gridShift 16s linear infinite;
      mix-blend-mode:screen;
    }
    @keyframes gridShift{
      0%{transform:translate(0,0)}
      100%{transform:translate(64px,64px)}
    }

    .circuit-lines{
      position:fixed; inset:0;
      pointer-events:none;
      opacity:.10;
      background-image:
        linear-gradient(45deg, transparent 46%, rgba(0,255,255,.18) 47%, rgba(0,255,255,.18) 48%, transparent 49%),
        linear-gradient(-45deg, transparent 46%, rgba(0,136,255,.16) 47%, rgba(0,136,255,.16) 48%, transparent 49%);
      background-size:180px 180px;
      animation:circuitFlow 12s linear infinite;
      mix-blend-mode:screen;
    }
    @keyframes circuitFlow{
      0%{background-position:0 0,0 0}
      100%{background-position:180px 180px,-180px 180px}
    }

    /* ✅ Scanner line: FAST movement, but pauses at top + bottom */
    .scan-line{
      position:fixed;
      left:0;
      top:0;
      width:100%;
      height:10px;
      pointer-events:none;
      background:linear-gradient(90deg, transparent 0%, var(--p) 40%, var(--a) 50%, var(--p) 60%, transparent 100%);
      box-shadow:
        0 0 40px var(--p),
        0 0 90px rgba(0,255,255,.35);
      opacity:.95;
      mix-blend-mode:screen;

      /* Fast like original, but with pause */
      animation: scanCycle 6.8s ease-in-out infinite;
    }

    /* Down fast -> pause -> up fast -> pause */
    @keyframes scanCycle{
      0%   { transform:translateY(-18vh); opacity:0; }
      6%   { transform:translateY(-18vh); opacity:1; }  /* fade in */
      16%  { transform:translateY(-18vh); opacity:1; }  /* pause top */
      50%  { transform:translateY(118vh); opacity:1; }  /* down */
      62%  { transform:translateY(118vh); opacity:1; }  /* pause bottom */
      96%  { transform:translateY(-18vh); opacity:1; }  /* up */
      100% { transform:translateY(-18vh); opacity:0; }  /* fade out */
    }

    /* --- HUD now bottom-left --- */
    #hud{
      position:fixed;
      bottom:14px;
      left:14px;
      z-index:50;
      background:rgba(0,0,0,.55);
      border:1px solid rgba(0,255,255,.18);
      border-radius:16px;
      padding:10px 12px;
      backdrop-filter:blur(14px);
      box-shadow:0 0 18px rgba(0,255,255,.12);
      font-size:12px;
      letter-spacing:1px;
      width:min(300px, calc(100vw - 28px));
      user-select:none;
    }

    .hud-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin:3px 0;
    }

    .dot{
      width:7px;height:7px;border-radius:999px;
      background:var(--p);
      box-shadow:0 0 10px var(--p);
      animation:pulse 1.6s ease-in-out infinite;
      margin-left:8px;
      flex:0 0 auto;
    }
    @keyframes pulse{
      0%,100%{opacity:1;transform:scale(1)}
      50%{opacity:.45;transform:scale(1.35)}
    }

    .value{
      color:var(--a);
      text-shadow:0 0 10px rgba(136,255,255,.25);
    }

    /* --- Hero text (stays center) --- */
    #hero{
      position:fixed;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      z-index:30;
      width:min(980px, 92vw);
      text-align:center;
      pointer-events:none;
    }

    #hero h1{
      font-size:clamp(28px, 4.6vw, 58px);
      line-height:1.05;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:4px;
      text-shadow:
        0 0 14px rgba(0,255,255,.40),
        0 0 40px rgba(0,255,255,.18);
      margin-bottom:12px;
    }

    #hero p{
      opacity:.86;
      font-size:clamp(12px, 1.8vw, 16px);
      max-width:72ch;
      margin:0 auto;
      text-shadow:0 0 16px rgba(0,255,255,.12);
    }

    /* ✅ NAVBAR now top-center */
    #navbar{
      position:fixed;
      top:14px;
      left:50%;
      transform:translateX(-50%);
      z-index:60;

      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:center;

      padding:10px 14px;
      border-radius:18px;
      background:rgba(0,0,0,.55);
      border:1px solid rgba(0,255,255,.18);
      backdrop-filter:blur(14px);
      width:min(900px, calc(100vw - 28px));
      box-shadow:0 0 18px rgba(0,255,255,.10);
    }

    .btn{
      pointer-events:auto;
      cursor:pointer;
      border-radius:999px;
      padding:10px 14px;
      border:1px solid rgba(0,255,255,.25);
      background:rgba(0,255,255,.06);
      color:var(--p);
      font-family:inherit;
      text-transform:uppercase;
      letter-spacing:1.4px;
      font-weight:600;
      transition:transform .15s ease, background .2s ease, box-shadow .2s ease;
      position:relative;
      overflow:hidden;
    }
    .btn:hover{
      transform:scale(1.03);
      background:rgba(0,255,255,.10);
      box-shadow:0 0 16px rgba(0,255,255,.22);
    }
    .btn:active{transform:scale(.98)}

    .btn::after{
      content:"";
      position:absolute;
      top:-40%;
      left:-35%;
      width:35%;
      height:180%;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.6), transparent);
      transform:skewX(-18deg);
      opacity:.0;
      animation:zap 3.2s linear infinite;
    }
    .btn:hover::after{opacity:1}
    @keyframes zap{
      0%{transform:translateX(-140%) skewX(-18deg)}
      100%{transform:translateX(500%) skewX(-18deg)}
    }

    .toggle{
      pointer-events:auto;
      display:flex;
      align-items:center;
      gap:8px;
      padding:9px 12px;
      border-radius:999px;
      border:1px solid rgba(0,255,255,.18);
      background:rgba(0,0,0,.35);
      font-size:11px;
      letter-spacing:1px;
      user-select:none;
    }

    .switch{
      width:44px;height:24px;
      border-radius:999px;
      border:1px solid rgba(0,255,255,.35);
      background:rgba(0,20,30,.7);
      position:relative;
      cursor:pointer;
      box-shadow:inset 0 0 10px rgba(0,255,255,.10);
    }

    .switch::before{
      content:"";
      position:absolute;
      top:2px; left:2px;
      width:18px;height:18px;
      border-radius:999px;
      background:var(--p);
      box-shadow:0 0 12px rgba(0,255,255,.35);
      transition:transform .22s ease, background .22s ease;
    }

    .switch.on::before{
      transform:translateX(20px);
      background:var(--a);
      box-shadow:0 0 16px rgba(136,255,255,.35);
    }

    @media(max-width:720px){
      #hud{font-size:11px}
      .toggle{font-size:10px}
    }

    @media (prefers-reduced-motion: reduce){
      .grid-overlay,.circuit-lines,.scan-line,.btn::after{animation:none !important}
    }
  </style>

  <!-- Three.js import map -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
      }
    }
  </script>
</head>

<body>
  <div id="stage"></div>
  <div class="grid-overlay"></div>
  <div class="circuit-lines"></div>
  <div class="scan-line"></div>

  <!-- ✅ HUD bottom-left -->
  <div id="hud">
    <div class="hud-row">
      <span>SYSTEM</span>
      <span class="value">ONLINE</span>
      <span class="dot" title="online"></span>
    </div>
    <div class="hud-row">
      <span>MODE</span>
      <span class="value" id="hudMode">SPHERE</span>
    </div>
    <div class="hud-row">
      <span>FPS</span>
      <span class="value" id="hudFps">60</span>
    </div>
    <div class="hud-row">
      <span>NODES</span>
      <span class="value" id="hudNodes">12,000</span>
    </div>
  </div>

  <!-- Hero Text -->
  <div id="hero">
    <h1>ALPHA ALERTS</h1>
    <p>
      A living scanner system. Smooth motion, real glow, and a core that transforms.
      Hit <span style="color:var(--a)">NEXT MODE</span> and watch it change.
    </p>
  </div>

  <!-- ✅ NAVBAR top-center -->
  <div id="navbar">
    <button class="btn" id="btnNext">NEXT MODE</button>

    <div class="toggle">
      <span>TRAILS</span>
      <div class="switch on" id="swTrails"></div>
    </div>

    <div class="toggle">
      <span>GLOW</span>
      <div class="switch on" id="swGlow"></div>
    </div>
  </div>

  <script type="module">
    import * as THREE from "three";
    import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
    import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
    import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";

    // --------------------------------------------
    // 1) Settings
    // --------------------------------------------
    const isMobile = matchMedia("(max-width: 720px)").matches;
    const prefersReduced = matchMedia("(prefers-reduced-motion: reduce)").matches;

    const NODE_COUNT = prefersReduced ? 6000 : (isMobile ? 8000 : 12000);
    const TRAIL_COUNT = prefersReduced ? 1200 : (isMobile ? 1800 : 2600);

    const MODE_NAMES = ["SPHERE", "VORTEX", "GRID"];
    let modeIndex = 0;

    let trailsOn = true;
    let glowOn = true;

    // ✅ Push the whole core down a bit for more top breathing room
    const CORE_Y = -8;

    // --------------------------------------------
    // 2) DOM hooks
    // --------------------------------------------
    const stage = document.getElementById("stage");
    const hudMode = document.getElementById("hudMode");
    const hudFps = document.getElementById("hudFps");
    const hudNodes = document.getElementById("hudNodes");

    const btnNext = document.getElementById("btnNext");
    const swTrails = document.getElementById("swTrails");
    const swGlow = document.getElementById("swGlow");

    hudNodes.textContent = NODE_COUNT.toLocaleString();

    // --------------------------------------------
    // 3) Scene setup
    // --------------------------------------------
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000814, isMobile ? 0.012 : 0.008);

    const camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.1, 2500);
    camera.position.set(0, 0, 170);

    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      alpha: true,
      powerPreference: "high-performance"
    });

    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    stage.appendChild(renderer.domElement);

    const hemi = new THREE.HemisphereLight(0xffffff, 0x000000, 1);
    scene.add(hemi);

    // Bloom glow
    let composer = null;
    let bloomPass = null;

    function setupComposer() {
      composer = new EffectComposer(renderer);
      composer.addPass(new RenderPass(scene, camera));
      bloomPass = new UnrealBloomPass(
        new THREE.Vector2(innerWidth, innerHeight),
        isMobile ? 0.35 : 0.60,
        0.55,
        0.85
      );
      composer.addPass(bloomPass);
    }
    setupComposer();

    // --------------------------------------------
    // 4) Helpers: generate shape positions
    // --------------------------------------------
    function rand(min, max) { return min + Math.random() * (max - min); }

    function posSphere(i, n) {
      const t = i / n;
      const phi = Math.acos(1 - 2 * t);
      const theta = Math.PI * (1 + Math.sqrt(5)) * i;

      // slightly smaller than before so it doesn't smash the navbar
      const r = 74 + Math.sin(phi * 6) * 3.0;

      return new THREE.Vector3(
        r * Math.sin(phi) * Math.cos(theta),
        r * Math.sin(phi) * Math.sin(theta),
        r * Math.cos(phi)
      );
    }

    function posVortex(i, n) {
      const t = i / n;
      const a = t * Math.PI * 2;
      const twist = a * 8.0;
      const major = 62;
      const minor = 18 + Math.sin(a * 3) * 6;
      return new THREE.Vector3(
        (major + minor * Math.cos(twist)) * Math.cos(a),
        minor * Math.sin(twist) + Math.sin(a * 4) * 6,
        (major + minor * Math.cos(twist)) * Math.sin(a)
      );
    }

    function posGrid(i, n) {
      const side = Math.floor(Math.sqrt(n));
      const x = (i % side) - side / 2;
      const z = Math.floor(i / side) - side / 2;
      const spacing = 2.1;
      const wave = Math.sin(x * 0.35) * 5 + Math.cos(z * 0.35) * 5;
      return new THREE.Vector3(x * spacing, wave, z * spacing);
    }

    const generators = [posSphere, posVortex, posGrid];

    // --------------------------------------------
    // 5) Particles core
    // --------------------------------------------
    const geo = new THREE.BufferGeometry();
    const positions = new Float32Array(NODE_COUNT * 3);
    const colors = new Float32Array(NODE_COUNT * 3);
    const sizes = new Float32Array(NODE_COUNT);

    let baseColor = new THREE.Color("#00ffff");

    function colorize(i) {
      const hsl = {};
      baseColor.getHSL(hsl);
      const hue = (hsl.h + (i / NODE_COUNT) * 0.18) % 1;
      const sat = Math.min(1, Math.max(0.55, hsl.s));
      const lit = Math.min(0.70, Math.max(0.35, hsl.l + Math.sin(i * 0.01) * 0.05));
      return new THREE.Color().setHSL(hue, sat, lit);
    }

    function fillPositions(genFn) {
      for (let i = 0; i < NODE_COUNT; i++) {
        const p = genFn(i, NODE_COUNT);
        positions[i * 3 + 0] = p.x;
        positions[i * 3 + 1] = p.y + CORE_Y; // ✅ push down
        positions[i * 3 + 2] = p.z;

        const c = colorize(i);
        colors[i * 3 + 0] = c.r;
        colors[i * 3 + 1] = c.g;
        colors[i * 3 + 2] = c.b;

        sizes[i] = isMobile ? rand(1.1, 2.2) : rand(1.2, 2.8);
      }
    }

    fillPositions(generators[0]);

    geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
    geo.setAttribute("color", new THREE.BufferAttribute(colors, 3));
    geo.setAttribute("size", new THREE.BufferAttribute(sizes, 1));

    function makePointTexture() {
      const c = document.createElement("canvas");
      c.width = 128; c.height = 128;
      const g = c.getContext("2d");
      const grad = g.createRadialGradient(64, 64, 0, 64, 64, 64);
      grad.addColorStop(0, "rgba(255,255,255,1)");
      grad.addColorStop(0.35, "rgba(255,255,255,0.65)");
      grad.addColorStop(0.7, "rgba(255,255,255,0.15)");
      grad.addColorStop(1, "rgba(255,255,255,0)");
      g.fillStyle = grad;
      g.fillRect(0, 0, 128, 128);
      return new THREE.CanvasTexture(c);
    }

    const pointTex = makePointTexture();

    const mat = new THREE.ShaderMaterial({
      uniforms: {
        time: { value: 0 },
        tex: { value: pointTex },
        glow: { value: 1.0 }
      },
      vertexShader: `
        attribute vec3 color;
        attribute float size;
        varying vec3 vColor;
        uniform float time;
        uniform float glow;
        void main(){
          vColor = color * glow;

          vec3 p = position;
          p += normalize(position) * (sin(time * 1.7 + position.y * 0.04) * 0.35);

          vec4 mv = modelViewMatrix * vec4(p, 1.0);
          gl_PointSize = size * (320.0 / -mv.z);
          gl_Position = projectionMatrix * mv;
        }
      `,
      fragmentShader: `
        uniform sampler2D tex;
        varying vec3 vColor;
        void main(){
          vec4 t = texture2D(tex, gl_PointCoord);
          gl_FragColor = vec4(vColor, t.a);
        }
      `,
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending
    });

    const core = new THREE.Points(geo, mat);
    scene.add(core);

    // --------------------------------------------
    // 6) Trails
    // --------------------------------------------
    const tGeo = new THREE.BufferGeometry();
    const tPos = new Float32Array(TRAIL_COUNT * 3);
    const tCol = new Float32Array(TRAIL_COUNT * 3);
    const tSize = new Float32Array(TRAIL_COUNT);

    function initTrails() {
      for (let i = 0; i < TRAIL_COUNT; i++) {
        tPos[i * 3 + 0] = rand(-85, 85);
        tPos[i * 3 + 1] = rand(-85, 85) + CORE_Y; // ✅ match core offset
        tPos[i * 3 + 2] = rand(-85, 85);

        const c = colorize(Math.floor(rand(0, NODE_COUNT)));
        tCol[i * 3 + 0] = c.r;
        tCol[i * 3 + 1] = c.g;
        tCol[i * 3 + 2] = c.b;

        tSize[i] = rand(0.6, isMobile ? 1.4 : 2.0);
      }
    }
    initTrails();

    tGeo.setAttribute("position", new THREE.BufferAttribute(tPos, 3));
    tGeo.setAttribute("color", new THREE.BufferAttribute(tCol, 3));
    tGeo.setAttribute("size", new THREE.BufferAttribute(tSize, 1));

    const tMat = new THREE.ShaderMaterial({
      uniforms: {
        time: { value: 0 },
        tex: { value: pointTex }
      },
      vertexShader: `
        attribute vec3 color;
        attribute float size;
        varying vec3 vColor;
        uniform float time;
        void main(){
          vColor = color;
          vec3 p = position;
          p.y += sin(time * 2.2 + p.x * 0.05) * 0.25;

          vec4 mv = modelViewMatrix * vec4(p, 1.0);
          gl_PointSize = size * (300.0 / -mv.z);
          gl_Position = projectionMatrix * mv;
        }
      `,
      fragmentShader: `
        uniform sampler2D tex;
        varying vec3 vColor;
        void main(){
          vec4 t = texture2D(tex, gl_PointCoord);
          gl_FragColor = vec4(vColor, t.a * 0.85);
        }
      `,
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending
    });

    const trails = new THREE.Points(tGeo, tMat);
    scene.add(trails);

    // --------------------------------------------
    // ✅ 7) Mouse interaction is BACK
    // --------------------------------------------
    const mouse = { x: 0, y: 0 };
    let targetRot = { x: 0, y: 0 };
    let rot = { x: 0, y: 0 };

    // ✅ Use pointermove so it works on mouse + touchpads
    window.addEventListener("pointermove", (e) => {
      const nx = (e.clientX / innerWidth) * 2 - 1;
      const ny = (e.clientY / innerHeight) * 2 - 1;
      mouse.x = nx;
      mouse.y = ny;

      targetRot.y = nx * 0.55;
      targetRot.x = -ny * 0.35;
    });

    // --------------------------------------------
    // 8) Morph between modes
    // --------------------------------------------
    let morphing = false;
    let morphT = 0;

    let fromPos = new Float32Array(positions);
    let toPos = new Float32Array(positions);

    function startMorph(nextIndex) {
      if (morphing) return;

      modeIndex = nextIndex;
      hudMode.textContent = MODE_NAMES[modeIndex];

      fromPos = new Float32Array(positions);
      toPos = new Float32Array(positions.length);

      const gen = generators[modeIndex];
      for (let i = 0; i < NODE_COUNT; i++) {
        const p = gen(i, NODE_COUNT);
        toPos[i * 3 + 0] = p.x;
        toPos[i * 3 + 1] = p.y + CORE_Y; // ✅ keep down offset
        toPos[i * 3 + 2] = p.z;
      }

      morphing = true;
      morphT = 0;
    }

    function easeInOutCubic(t){
      return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3) / 2;
    }

    // --------------------------------------------
    // 9) UI toggles
    // --------------------------------------------
    function setSwitch(el, on){
      el.classList.toggle("on", !!on);
    }

    swTrails.onclick = () => {
      trailsOn = !trailsOn;
      setSwitch(swTrails, trailsOn);
      trails.visible = trailsOn;
    };

    swGlow.onclick = () => {
      glowOn = !glowOn;
      setSwitch(swGlow, glowOn);
      mat.uniforms.glow.value = glowOn ? 1.0 : 0.55;
      if (bloomPass) bloomPass.strength = glowOn ? (isMobile ? 0.35 : 0.60) : 0.0;
    };

    btnNext.onclick = () => startMorph((modeIndex + 1) % 3);

    // --------------------------------------------
    // 10) FPS counter
    // --------------------------------------------
    let frames = 0;
    let fpsTime = performance.now();

    function updateFps(){
      frames++;
      const now = performance.now();
      if (now - fpsTime > 700){
        const fps = Math.round((frames * 1000) / (now - fpsTime));
        hudFps.textContent = String(fps);
        frames = 0;
        fpsTime = now;
      }
    }

    // --------------------------------------------
    // ✅ 11) Animation loop
    // --------------------------------------------
    let t = 0;

    // Auto-rotation layer (still alive even if mouse isn't moving)
    let autoRot = { x: 0, y: 0 };

    function tick(){
      requestAnimationFrame(tick);

      updateFps();
      t += prefersReduced ? 0.006 : 0.012;

      mat.uniforms.time.value = t;
      tMat.uniforms.time.value = t;

      // ✅ Smooth mouse follow
      rot.x += (targetRot.x - rot.x) * 0.06;
      rot.y += (targetRot.y - rot.y) * 0.06;

      // ✅ Auto rotation still adds "life"
      if (!morphing){
        if (modeIndex === 0){
          autoRot.y += 0.0025;
        } else if (modeIndex === 1){
          autoRot.x += 0.0018;
          autoRot.y += 0.0022;
        } else {
          autoRot.y += 0.0015;
        }
      }

      // ✅ Final rotation = mouse + auto
      core.rotation.x = rot.x + autoRot.x;
      core.rotation.y = rot.y + autoRot.y;

      // Camera breathing
      camera.position.z = 170 + Math.sin(t * 0.6) * 1.5;
      camera.lookAt(0, CORE_Y, 0);

      // Trails drift
      if (trailsOn){
        const p = tGeo.getAttribute("position").array;
        for (let i = 0; i < TRAIL_COUNT; i++){
          const iy = i * 3 + 1;
          p[iy] += 0.22;
          if (p[iy] > 95 + CORE_Y) p[iy] = -95 + CORE_Y;
        }
        tGeo.getAttribute("position").needsUpdate = true;
      }

      // Morph animation
      if (morphing){
        morphT += isMobile ? 0.020 : 0.018;
        const e = easeInOutCubic(Math.min(1, morphT));

        for (let i = 0; i < positions.length; i++){
          positions[i] = fromPos[i] * (1 - e) + toPos[i] * e;
        }
        geo.getAttribute("position").needsUpdate = true;

        if (morphT >= 1){
          morphing = false;
        }
      }

      // Render
      if (glowOn && composer){
        composer.render();
      } else {
        renderer.render(scene, camera);
      }
    }
    tick();

    // Resize
    addEventListener("resize", () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
      if (composer) composer.setSize(innerWidth, innerHeight);
    });

    // Init HUD
    hudMode.textContent = MODE_NAMES[0];
    setSwitch(swTrails, trailsOn);
    setSwitch(swGlow, glowOn);
  </script>
</body>
</html>
